name: Fetch Oref Alerts

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch active alerts
        run: |
          curl -s \
            -H "Referer: https://www.oref.org.il/" \
            -H "X-Requested-With: XMLHttpRequest" \
            -H "Accept: application/json" \
            --max-time 10 \
            "https://www.oref.org.il/WarningMessages/alert/alerts.json" \
            -o alerts.json || echo "{}" > alerts.json

      - name: Fetch history
        run: |
          curl -s \
            -H "Referer: https://www.oref.org.il/" \
            -H "X-Requested-With: XMLHttpRequest" \
            -H "Accept: application/json" \
            --max-time 10 \
            "https://www.oref.org.il/WarningMessages/alert/History/AlertsHistory.json" \
            -o history.json || echo "[]" > history.json

      - name: Add timestamp
        run: |
          echo "{\"updated\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > meta.json

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alerts.json history.json meta.json
          git diff --staged --quiet || git commit -m "update alerts $(date -u +%H:%M:%S)"
          git push
