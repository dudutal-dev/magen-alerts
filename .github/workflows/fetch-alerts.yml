name: Fetch Oref Alerts

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch active alerts (oref → Tzofar fallback)
        run: |
          # Try oref first
          RESP=$(curl -sf --max-time 10 \
            -H "Referer: https://www.oref.org.il/" \
            -H "X-Requested-With: XMLHttpRequest" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            -H "Accept: application/json" \
            "https://www.oref.org.il/WarningMessages/alert/alerts.json" 2>/dev/null)

          if echo "$RESP" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
            echo "$RESP" > alerts.json
            echo "✅ alerts from oref"
          else
            # Tzofar active alert endpoint
            RESP2=$(curl -sf --max-time 10 \
              "https://api.tzevaadom.co.il/notifications" 2>/dev/null)
            if echo "$RESP2" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
              # Convert Tzofar format to oref format
              python3 << 'PYEOF'
          import json, sys
          raw = json.load(open('/dev/stdin'))
          # Tzofar returns list of active alerts
          if isinstance(raw, list) and len(raw) > 0:
              first = raw[0]
              out = {
                  "id": str(first.get("time", "")),
                  "cat": str(first.get("category", "1")),
                  "title": first.get("threat", "ירי רקטות וטילים"),
                  "data": [c.get("name", c) if isinstance(c, dict) else c for c in first.get("cities", [])]
              }
          else:
              out = {}
          json.dump(out, open("alerts.json", "w"), ensure_ascii=False)
          PYEOF
              echo "$RESP2" | python3 -
              echo "✅ alerts from Tzofar"
            else
              echo "{}" > alerts.json
              echo "⚠️ no active alerts data"
            fi
          fi

      - name: Fetch history (Tzofar)
        run: |
          # Tzofar history API - open and accessible
          RESP=$(curl -sf --max-time 20 \
            -H "Accept: application/json" \
            "https://api.tzevaadom.co.il/alerts-history/" 2>/dev/null)

          if echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); assert isinstance(d, list); print(f'Got {len(d)} alerts')" 2>/dev/null; then
            echo "$RESP" > history.json
            echo "✅ history from Tzofar"
          else
            # Try oref history as fallback
            RESP2=$(curl -sf --max-time 20 \
              -H "Referer: https://www.oref.org.il/" \
              -H "X-Requested-With: XMLHttpRequest" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
              "https://www.oref.org.il/WarningMessages/alert/History/AlertsHistory.json" 2>/dev/null)
            if echo "$RESP2" | python3 -c "import sys,json; d=json.load(sys.stdin); assert isinstance(d,list)" 2>/dev/null; then
              echo "$RESP2" > history.json
              echo "✅ history from oref"
            else
              echo "⚠️ history fetch failed, keeping existing"
            fi
          fi

      - name: Update timestamp
        run: |
          COUNT=$(python3 -c "import json; d=json.load(open('history.json')); print(len(d))" 2>/dev/null || echo "0")
          echo "{\"updated\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"count\":$COUNT}" > meta.json
          echo "📊 History entries: $COUNT"

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alerts.json history.json meta.json
          git commit -m "update $(date -u +%H:%M:%S)" --allow-empty
          git push
