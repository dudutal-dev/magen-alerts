name: Fetch Oref Alerts

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch active alerts
        run: |
          curl -s --max-time 10 \
            -H "Referer: https://www.oref.org.il/" \
            -H "X-Requested-With: XMLHttpRequest" \
            -H "User-Agent: Mozilla/5.0" \
            "https://www.oref.org.il/WarningMessages/alert/alerts.json" \
            -o alerts_raw.txt || true
          python3 parse_alerts.py

      - name: Fetch history
        run: |
          curl -s --max-time 15 \
            -H "Accept: application/json" \
            "https://api.tzevaadom.co.il/alerts-history/" \
            -o hist_raw.txt || true
          python3 parse_history.py

      - name: Timestamp
        run: |
          python3 make_meta.py

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alerts.json history.json meta.json
          git commit --allow-empty -m "update $(date -u +%H:%M:%S)"
          git push
