<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#152040"/>
      <stop offset="100%" stop-color="#080a0f"/>
    </radialGradient>
    <radialGradient id="shield-fill" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1e3a6e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0.2"/>
    </radialGradient>
    <linearGradient id="shield-stroke" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="glow-strong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="inner-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle background glow -->
  <ellipse cx="256" cy="200" rx="180" ry="140" fill="#1e40af" opacity="0.08"/>

  <!-- Shield body fill -->
  <path d="M256 68 L404 132 L404 276 Q404 378 256 452 Q108 378 108 276 L108 132 Z"
        fill="url(#shield-fill)"/>

  <!-- Shield outer stroke — glowing -->
  <path d="M256 68 L404 132 L404 276 Q404 378 256 452 Q108 378 108 276 L108 132 Z"
        fill="none"
        stroke="url(#shield-stroke)"
        stroke-width="10"
        stroke-linejoin="round"
        opacity="0.9"
        filter="url(#glow-soft)"/>

  <!-- Shield inner highlight (top-left rim) -->
  <path d="M256 82 L390 142 L390 276"
        fill="none"
        stroke="#bfdbfe"
        stroke-width="3"
        stroke-linecap="round"
        opacity="0.25"/>

  <!-- Crosshair outer ring -->
  <circle cx="256" cy="268" r="76"
          fill="none"
          stroke="#3b82f6"
          stroke-width="6"
          opacity="0.5"
          filter="url(#glow-soft)"/>

  <!-- Crosshair inner ring -->
  <circle cx="256" cy="268" r="38"
          fill="none"
          stroke="#60a5fa"
          stroke-width="3.5"
          opacity="0.7"/>

  <!-- Crosshair lines - vertical top -->
  <line x1="256" y1="168" x2="256" y2="216"
        stroke="#60a5fa" stroke-width="6"
        stroke-linecap="round" opacity="0.8"
        filter="url(#glow-soft)"/>

  <!-- Crosshair lines - vertical bottom -->
  <line x1="256" y1="320" x2="256" y2="368"
        stroke="#60a5fa" stroke-width="6"
        stroke-linecap="round" opacity="0.8"
        filter="url(#glow-soft)"/>

  <!-- Crosshair lines - horizontal left -->
  <line x1="156" y1="268" x2="204" y2="268"
        stroke="#60a5fa" stroke-width="6"
        stroke-linecap="round" opacity="0.8"
        filter="url(#glow-soft)"/>

  <!-- Crosshair lines - horizontal right -->
  <line x1="308" y1="268" x2="356" y2="268"
        stroke="#60a5fa" stroke-width="6"
        stroke-linecap="round" opacity="0.8"
        filter="url(#glow-soft)"/>

  <!-- Center dot — bright core -->
  <circle cx="256" cy="268" r="10"
          fill="#93c5fd"
          filter="url(#glow-strong)"/>
  <circle cx="256" cy="268" r="5"
          fill="#ffffff"
          opacity="0.95"/>

  <!-- Corner tick marks on outer ring -->
  <line x1="314" y1="210" x2="322" y2="202"
        stroke="#3b82f6" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="198" y1="210" x2="190" y2="202"
        stroke="#3b82f6" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="314" y1="326" x2="322" y2="334"
        stroke="#3b82f6" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="198" y1="326" x2="190" y2="334"
        stroke="#3b82f6" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
</svg>
