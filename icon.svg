<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1520"/>
      <stop offset="100%" style="stop-color:#030608"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="50%" style="stop-color:#0d2035"/>
      <stop offset="100%" style="stop-color:#061018"/>
    </linearGradient>
    <linearGradient id="glow-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5a0;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#00c8ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="shield-clip">
      <path d="M50 8 L88 22 L88 52 Q88 76 50 94 Q12 76 12 52 L12 22 Z"/>
    </clipPath>
  </defs>

  <!-- Background rounded rect -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#00e5a0" stroke-width="0.4">
    <line x1="0" y1="25" x2="100" y2="25"/>
    <line x1="0" y1="50" x2="100" y2="50"/>
    <line x1="0" y1="75" x2="100" y2="75"/>
    <line x1="25" y1="0" x2="25" y2="100"/>
    <line x1="50" y1="0" x2="50" y2="100"/>
    <line x1="75" y1="0" x2="75" y2="100"/>
  </g>

  <!-- Shield shadow -->
  <path d="M50 10 L86 23 L86 52 Q86 75 50 93 Q14 75 14 52 L14 23 Z"
    fill="rgba(0,0,0,0.4)" transform="translate(1,2)"/>

  <!-- Shield body -->
  <path d="M50 10 L86 23 L86 52 Q86 75 50 93 Q14 75 14 52 L14 23 Z"
    fill="url(#shield-grad)"/>

  <!-- Glow overlay -->
  <path d="M50 10 L86 23 L86 52 Q86 75 50 93 Q14 75 14 52 L14 23 Z"
    fill="url(#glow-top)" opacity="0.15" clip-path="url(#shield-clip)"/>

  <!-- Shield border -->
  <path d="M50 10 L86 23 L86 52 Q86 75 50 93 Q14 75 14 52 L14 23 Z"
    fill="none" stroke="#00e5a0" stroke-width="1.2" opacity="0.6" filter="url(#glow)"/>

  <!-- Top edge highlight -->
  <path d="M50 10 L86 23" stroke="#00e5a0" stroke-width="2"
    stroke-linecap="round" opacity="0.95" filter="url(#glow)"/>
  <path d="M50 10 L14 23" stroke="#00e5a0" stroke-width="2"
    stroke-linecap="round" opacity="0.95" filter="url(#glow)"/>

  <!-- Magen David tactical -->
  <g transform="translate(50,52)" filter="url(#glow)">
    <polygon points="0,-18 15.6,9 -15.6,9"
      fill="none" stroke="#00e5a0" stroke-width="1.8" stroke-linejoin="round" opacity="0.95"/>
    <polygon points="0,18 15.6,-9 -15.6,-9"
      fill="none" stroke="#00e5a0" stroke-width="1.8" stroke-linejoin="round" opacity="0.95"/>
    <circle r="2.5" fill="#00e5a0" opacity="0.9"/>
  </g>

  <!-- Scan lines -->
  <g opacity="0.2" stroke="#00e5a0" stroke-width="0.6">
    <line x1="14" y1="38" x2="24" y2="38"/>
    <line x1="76" y1="38" x2="86" y2="38"/>
  </g>

  <!-- Label -->
  <text x="50" y="97" text-anchor="middle"
    font-family="monospace" font-size="5" font-weight="bold"
    letter-spacing="2" fill="#00e5a0" opacity="0.5">MAGEN</text>
</svg>
